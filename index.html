<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PixelForge</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
</head>
<style>
    /* PixelForge — style.css */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d0e14;
  --surface:  #161822;
  --surface2: #1e2030;
  --border:   #2a2d45;
  --accent:   #ff6b35;
  --accent2:  #00d4ff;
  --text:     #e8eaf0;
  --muted:    #5a5f80;
  --danger:   #ff3a5e;
  --font:     'Space Mono', monospace;
  --display:  'Silkscreen', monospace;
  --tb-h:     auto;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  font-size: 11px;
}

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(6px);
  padding: 16px;
}
.modal-overlay.hidden { display: none; }

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7);
}
.modal-box.wide { max-width: 820px; max-height: 85vh; overflow-y: auto; }

.modal-title {
  font-family: var(--display);
  font-size: 20px;
  color: var(--accent);
  letter-spacing: 4px;
  margin-bottom: 6px;
}
.modal-sub { color: var(--muted); font-size: 11px; margin-bottom: 24px; }

.setup-row { margin-bottom: 20px; }
.setup-row > label {
  display: block; color: var(--muted); font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
}
.btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
.sg-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 11px;
  padding: 6px 12px; border-radius: 3px; cursor: pointer; transition: all 0.15s;
}
.sg-btn:hover { border-color: var(--accent); color: var(--accent); }
.sg-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

.custom-size-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.custom-size-row input {
  width: 64px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 12px;
  padding: 6px 8px; border-radius: 3px; outline: none;
}
.custom-size-row input:focus { border-color: var(--accent2); }
.custom-size-row span { color: var(--muted); }
.custom-size-row button {
  background: var(--surface2); border: 1px solid var(--border); color: var(--accent2);
  font-family: var(--font); font-size: 11px; padding: 6px 12px; border-radius: 3px; cursor: pointer;
}
.custom-size-row button:hover { background: var(--accent2); color: #000; }
.preview-info { font-family: var(--display); font-size: 13px; color: var(--accent2); letter-spacing: 1px; }

.start-btn {
  display: block; width: 100%; margin-top: 20px;
  background: var(--accent); border: none; color: #000;
  font-family: var(--display); font-size: 14px; letter-spacing: 3px;
  padding: 14px; border-radius: 3px; cursor: pointer; transition: opacity 0.15s;
}
.start-btn:hover { opacity: 0.85; }

/* ── App ── */
#app { display: flex; flex-direction: column; height: 100vh; }
#app.hidden { display: none; }

/* ── Toolbar — breathable, wrappable ── */
#toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.tb-section {
  display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
}
.tb-sep {
  width: 1px; height: 26px;
  background: var(--border); margin: 0 2px; flex-shrink: 0;
}
/* Hide sep on mobile when wrapping */
@media (max-width: 600px) { .tb-sep { display: none; } }

.logo {
  font-family: var(--display); font-size: 15px; color: var(--accent); letter-spacing: 2px;
}

.tb-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 10px;
  padding: 6px 10px; border-radius: 3px; cursor: pointer;
  white-space: nowrap; transition: all 0.12s; letter-spacing: 0.5px;
  line-height: 1.2;
}
.tb-btn:hover { border-color: var(--muted); color: #fff; }
.tb-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
.tb-btn.accent { background: var(--accent2); border-color: var(--accent2); color: #000; }
.tb-btn.accent:hover { opacity: 0.8; }
.tb-btn.danger { color: var(--danger); border-color: var(--danger); }
.tb-btn.danger:hover { background: var(--danger); color: #fff; }
.tb-btn.sm { padding: 5px 8px; }

/* Tool buttons */
.tool-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 15px;
  width: 34px; height: 34px; border-radius: 3px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; flex-shrink: 0;
}
.tool-btn:hover { border-color: var(--accent); }
.tool-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
#cropToggleBtn { width: auto; font-family: var(--font); font-size: 10px; padding: 5px 9px; }

/* Color section */
.color-section { display: flex; align-items: center; gap: 6px; }
.color-swatch-wrap { position: relative; cursor: pointer; }
.color-swatch {
  width: 30px; height: 30px; border-radius: 4px;
  border: 2px solid var(--border); background: #ff6b35;
}
.color-swatch-wrap input[type=color] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.hex-input {
  width: 72px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 10px;
  padding: 5px 7px; border-radius: 3px; outline: none; letter-spacing: 1px;
}
.hex-input:focus { border-color: var(--accent2); }

/* Palette */
#palette { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; max-width: 220px; }
.pal-swatch {
  width: 22px; height: 22px; border-radius: 3px; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s; flex-shrink: 0;
}
.pal-swatch:hover { transform: scale(1.2); border-color: rgba(255,255,255,0.4); }
.pal-swatch.active { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 0 1px var(--accent); }

/* Zoom */
.zoom-lbl {
  font-family: var(--display); font-size: 11px; color: var(--accent2);
  min-width: 44px; text-align: center;
}

/* ── Canvas area ── */
#canvasArea {
  flex: 1; overflow: hidden; position: relative;
  background: var(--bg); touch-action: none;
}
#canvasWrap {
  position: absolute; transform-origin: 0 0; user-select: none;
}
#pixelCanvas {
  display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: crosshair;
}

/* Coordinates */
.coords {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); border: 1px solid var(--border);
  color: var(--accent2); font-family: var(--display); font-size: 10px;
  padding: 4px 12px; border-radius: 3px; pointer-events: none; letter-spacing: 1px;
}

/* ── Text tool popup ── */
.text-pop {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 4px; padding: 14px 16px; z-index: 200; min-width: 240px;
}
.text-pop.hidden { display: none; }
.text-pop-title { font-family: var(--display); font-size: 11px; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; }
.text-pop-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 10px; color: var(--muted); }
.text-pop-row label { min-width: 90px; }
.text-pop-row input[type=range] { flex: 1; accent-color: var(--accent); }
.text-pop-row button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 10px; padding: 5px 14px; border-radius: 3px; cursor: pointer; }

.text-input {
  position: absolute; background: rgba(0,0,0,0.85); border: 1px solid var(--accent);
  color: #fff; font-family: var(--display); font-size: 13px;
  padding: 4px 8px; border-radius: 3px; outline: none; z-index: 100; min-width: 100px;
}
.text-input.hidden { display: none; }

/* ── Library ── */
.lib-actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.lib-actions button {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--font); font-size: 11px; padding: 7px 14px; border-radius: 3px; cursor: pointer;
}
.lib-actions button:hover { border-color: var(--accent); color: var(--accent); }
.lib-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px; max-height: 260px; overflow-y: auto; margin-bottom: 16px;
}
.lib-item {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
  padding: 8px; cursor: pointer; text-align: center; transition: border-color 0.15s;
}
.lib-item:hover { border-color: var(--accent); }
.lib-item-name { font-family: var(--display); font-size: 9px; color: var(--accent2); letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lib-json {
  width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--accent2);
  font-family: var(--font); font-size: 10px; padding: 10px; border-radius: 3px; resize: vertical; outline: none; min-height: 80px;
}

/* Push */
.push-form input.push-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--font); font-size: 12px; padding: 8px 12px; border-radius: 3px; outline: none;
}
.push-form input.push-input:focus { border-color: var(--accent2); }
.push-actions { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
.push-actions button {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--font); font-size: 11px; padding: 7px 14px; border-radius: 3px; cursor: pointer;
}
.push-actions button:hover { border-color: var(--accent); color: var(--accent); }

/* Export dropdown */
.export-wrap { position: relative; }
.dropdown {
  display: none; position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
  overflow: hidden; z-index: 300; min-width: 140px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}
.dropdown.open { display: block; }
.dropdown button {
  display: block; width: 100%; background: none; border: none; color: var(--text);
  font-family: var(--font); font-size: 11px; padding: 10px 14px;
  text-align: left; cursor: pointer;
}
.dropdown button:hover { background: var(--surface2); color: var(--accent); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── View mode ── */
body.view-mode #toolsGroup,
body.view-mode .color-section,
body.view-mode #palette,
body.view-mode #addPaletteBtn,
body.view-mode #unpaintBtn,
body.view-mode #clearBtn,
body.view-mode #cropToggleBtn,
body.view-mode #textPop { display: none; }
body.view-mode #canvasArea { cursor: default; }

/* ── Mobile responsive ── */
@media (max-width: 700px) {
  #toolbar { padding: 8px 10px; gap: 6px; }
  .tb-btn { font-size: 9px; padding: 5px 8px; }
  .tool-btn { width: 30px; height: 30px; font-size: 13px; }
  .color-swatch { width: 26px; height: 26px; }
  .hex-input { width: 60px; }
  #palette { max-width: 160px; }
  .pal-swatch { width: 18px; height: 18px; }
  .zoom-lbl { min-width: 36px; font-size: 10px; }
  .modal-box { padding: 20px 16px; }
  .modal-title { font-size: 16px; }
}

@media (max-width: 480px) {
  #toolbar { padding: 6px 8px; gap: 5px; }
  .tb-btn.hide-mobile { display: none; }
  .logo { font-size: 13px; }
  .hex-input { display: none; }
  #palette { max-width: 120px; }
}
</style>
<body>

<!-- Setup Modal -->
<div id="setupModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">PIXELFORGE</div>
    <div class="modal-sub">Configure your canvas</div>
    <div class="setup-row">
      <label>Canvas Size</label>
      <div class="btn-group" id="sizeGroup">
        <button class="sg-btn active" data-val="8">8×8</button>
        <button class="sg-btn" data-val="16">16×16</button>
        <button class="sg-btn" data-val="24">24×24</button>
        <button class="sg-btn" data-val="32">32×32</button>
        <button class="sg-btn" data-val="48">48×48</button>
        <button class="sg-btn" data-val="64">64×64</button>
      </div>
    </div>
    <div class="setup-row">
      <label>Custom Size</label>
      <div class="custom-size-row">
        <input type="number" id="customW" min="2" max="128" placeholder="W">
        <span>×</span>
        <input type="number" id="customH" min="2" max="128" placeholder="H">
        <button id="customApply">Apply</button>
      </div>
    </div>
    <div class="setup-row">
      <label>Preview</label>
      <div class="preview-info" id="previewInfo">8 × 8 pixels — 64 cells</div>
    </div>
    <button id="startBtn" class="start-btn">START DRAWING →</button>
  </div>
</div>

<!-- Main App -->
<div id="app" class="hidden">

  <header id="toolbar">

    <!-- Brand + mode -->
    <div class="tb-section">
      <div class="logo">PF</div>
      <div class="tb-sep"></div>
      <button class="tb-btn active" id="editModeBtn">✏ EDIT</button>
      <button class="tb-btn" id="viewModeBtn">👁 VIEW</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Tools -->
    <div class="tb-section" id="toolsGroup">
      <button class="tool-btn active" data-tool="paint" title="Paint (P)">🪣</button>
      <button class="tool-btn" data-tool="erase" title="Erase (R)">◻</button>
      <button class="tool-btn" data-tool="fill"  title="Fill (F)">⬛</button>
      <button class="tool-btn" data-tool="eyedrop" title="Eyedropper (K)">💉</button>
      <button class="tool-btn" data-tool="text"  title="Text (T)">𝐓</button>
      <button class="tool-btn tb-btn" id="cropToggleBtn" title="Crop area">⬚ CROP</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Color -->
    <div class="tb-section color-section">
      <div class="color-swatch-wrap" title="Pick color">
        <div id="colorSwatch" class="color-swatch"></div>
        <input type="color" id="colorPicker" value="#ff6b35">
      </div>
      <input type="text" id="colorHex" class="hex-input" value="#ff6b35" maxlength="7">
    </div>

    <div class="tb-sep"></div>

    <!-- Palette -->
    <div class="tb-section">
      <div id="palette"></div>
      <button class="tb-btn sm" id="addPaletteBtn" title="Save color to palette">+</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Actions -->
    <div class="tb-section">
      <button class="tb-btn" id="unpaintBtn">⌫ UNDO</button>
      <button class="tb-btn danger" id="clearBtn">✕ CLEAR</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Ghost + Zoom -->
    <div class="tb-section">
      <button class="tb-btn" id="ghostBtn" title="Ghost / onion skin">👻</button>
      <div class="tb-sep"></div>
      <button class="tb-btn sm" id="zoomOutBtn">−</button>
      <span id="zoomLbl" class="zoom-lbl">100%</span>
      <button class="tb-btn sm" id="zoomInBtn">+</button>
      <button class="tb-btn sm hide-mobile" id="zoomFitBtn">FIT</button>
    </div>

    <div class="tb-sep"></div>

    <!-- Library / Push / Export / New -->
    <div class="tb-section">
      <button class="tb-btn hide-mobile" id="libraryBtn">📚 LIB</button>
      <button class="tb-btn accent" id="pushBtn">⬆ PUSH</button>
      <div class="export-wrap">
        <button class="tb-btn accent" id="exportBtn">⬇ EXPORT ▾</button>
        <div id="exportMenu" class="dropdown">
          <button id="exportPNG">PNG (1×)</button>
          <button id="exportPNG3">PNG (3×)</button>
          <button id="exportSVG">SVG</button>
        </div>
      </div>
      <button class="tb-btn sm" id="newBtn">⊕ NEW</button>
    </div>

  </header>

  <main id="canvasArea">
    <div id="canvasWrap">
      <canvas id="pixelCanvas"></canvas>
    </div>
    <input type="text" id="textInput" class="text-input hidden" placeholder="Type…">
    <div id="coords" class="coords">—</div>
  </main>

</div>

<!-- Library Modal -->
<div id="libraryModal" class="modal-overlay hidden">
  <div class="modal-box wide">
    <div class="modal-title">LIBRARY</div>
    <div class="lib-actions">
      <button id="libImportBtn">📥 Import JSON</button>
      <button id="libCloseBtn">✕ Close</button>
    </div>
    <div id="libGrid" class="lib-grid"></div>
    <textarea id="libJsonArea" class="lib-json" placeholder="Paste JSON here then click Import"></textarea>
    <button id="libConfirmImport" class="start-btn" style="margin-top:10px;">IMPORT →</button>
  </div>
</div>

<!-- Push Modal -->
<div id="pushModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title">PUSH TO LIBRARY</div>
    <div class="push-form">
      <input type="text" id="pushName" placeholder="Sprite name…" class="push-input">
      <textarea id="pushJson" class="lib-json" readonly style="height:140px;margin-top:12px;"></textarea>
    </div>
    <div class="push-actions">
      <button id="pushCopyBtn">📋 Copy JSON</button>
      <button id="pushSaveBtn" class="start-btn" style="margin:0;flex:1;">SAVE</button>
      <button id="pushCloseBtn">✕</button>
    </div>
  </div>
</div>

<!-- Text tool popup -->
<div id="textPop" class="text-pop hidden">
  <div class="text-pop-title">TEXT TOOL</div>
  <div class="text-pop-row">
    <label>Font size</label>
    <input type="range" id="textFontSize" min="6" max="48" value="12">
    <span id="textFontSizeVal">12</span>
  </div>
  <div class="text-pop-row">
    <label>Color</label>
    <input type="color" id="textColorPick" value="#ffffff">
  </div>
  <div class="text-pop-row">
    <button id="textPopClose">Done ✓</button>
  </div>
</div>

<!-- Mobile library button (shown only on small screens) -->
<button id="libMobileBtn" onclick="document.getElementById('libraryBtn').click()" style="display:none;position:fixed;bottom:50px;right:14px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:8px 12px;border-radius:4px;cursor:pointer;z-index:50;">📚</button>

<script>
// Show mobile lib btn on small screens
if (window.innerWidth <= 700) document.getElementById('libMobileBtn').style.display = 'block';
window.addEventListener('resize', function() {
  document.getElementById('libMobileBtn').style.display = window.innerWidth <= 700 ? 'block' : 'none';
});
</script>
<script>
    /* PixelForge — app.js */

/* ── State ── */
var COLS = 8, ROWS = 8;
var CELL = 40;
var pixels = [];
var undoStack = [];
var currentColor = '#ff6b35';
var currentTool = 'paint';
var vpScale = 1;
var vpX = 0, vpY = 0;
var isPainting = false;
var isDragSelecting = false;
var dragSelectStart = null;
var lastPainted = -1;
var cropRect = null;
var cropActive = false;
var ghostData = null;
var viewMode = false;
var textFontSize = 12;
var textColor = '#ffffff';
var textPending = null;
var palette = ['#111111','#ffffff','#ff6b35','#00d4ff','#ff3a5e','#a8e063','#ffd700','#8b5cf6','#f97316','#06b6d4'];
var library = [];

/* WASD cursor */
var cursorCol = 0, cursorRow = 0, cursorVisible = false;

/* ── DOM refs ── */
var canvas = document.getElementById('pixelCanvas');
var ctx = canvas.getContext('2d');
var canvasWrap = document.getElementById('canvasWrap');
var canvasArea = document.getElementById('canvasArea');
var coordsEl = document.getElementById('coords');
var colorSwatch = document.getElementById('colorSwatch');
var colorPicker = document.getElementById('colorPicker');
var colorHex = document.getElementById('colorHex');
var textInput = document.getElementById('textInput');

/* ── Setup Modal ── */
(function setupModal() {
  var btns = document.querySelectorAll('.sg-btn');
  var previewInfo = document.getElementById('previewInfo');
  function setPreview(w, h) {
    COLS = w; ROWS = h;
    previewInfo.textContent = w + ' x ' + h + ' pixels - ' + (w * h) + ' cells';
    btns.forEach(function(b) { b.classList.toggle('active', +b.dataset.val === w && w === h); });
  }
  btns.forEach(function(b) {
    b.addEventListener('click', function() {
      setPreview(+b.dataset.val, +b.dataset.val);
      document.getElementById('customW').value = '';
      document.getElementById('customH').value = '';
    });
  });
  document.getElementById('customApply').addEventListener('click', function() {
    var w = parseInt(document.getElementById('customW').value) || 0;
    var h = parseInt(document.getElementById('customH').value) || 0;
    if (w >= 2 && h >= 2 && w <= 128 && h <= 128) setPreview(w, h);
  });
  document.getElementById('startBtn').addEventListener('click', function() {
    document.getElementById('setupModal').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    initCanvas(COLS, ROWS);
  });
})();

/* ── Init ── */
function initCanvas(cols, rows) {
  COLS = cols; ROWS = rows;
  pixels = new Array(cols * rows).fill(null);
  undoStack = [];
  ghostData = null;
  cropRect = null;
  cropActive = false;
  document.getElementById('cropToggleBtn').classList.remove('active');
  cursorCol = 0; cursorRow = 0; cursorVisible = false;
  autoFitZoom();
  renderAll();
  buildPaletteUI();
}

function autoFitZoom() {
  var pad = 48;
  var areaW = canvasArea.clientWidth - pad;
  var areaH = canvasArea.clientHeight - pad;
  vpScale = Math.max(0.5, Math.min(24, Math.min(areaW / (COLS * CELL), areaH / (ROWS * CELL))));
  centerCanvas();
}
function centerCanvas() {
  vpX = Math.round((canvasArea.clientWidth  - COLS * CELL * vpScale) / 2);
  vpY = Math.round((canvasArea.clientHeight - ROWS * CELL * vpScale) / 2);
  applyTransform();
}
function applyTransform() {
  canvasWrap.style.transform = 'translate(' + vpX + 'px,' + vpY + 'px) scale(' + vpScale + ')';
  canvasWrap.style.transformOrigin = '0 0';
  document.getElementById('zoomLbl').textContent = Math.round(vpScale * 100) + '%';
}

/* ── Render ── */
function renderAll() {
  var W = COLS * CELL, H = ROWS * CELL;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  /* White background always */
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  /* Pixels */
  for (var i = 0; i < pixels.length; i++) {
    if (!pixels[i]) continue;
    ctx.fillStyle = pixels[i];
    ctx.fillRect((i % COLS) * CELL, Math.floor(i / COLS) * CELL, CELL, CELL);
  }

  /* Ghost underlay */
  if (ghostData) {
    ctx.save(); ctx.globalAlpha = 0.28;
    for (var gi = 0; gi < ghostData.length; gi++) {
      if (!ghostData[gi]) continue;
      ctx.fillStyle = ghostData[gi];
      ctx.fillRect((gi % COLS) * CELL, Math.floor(gi / COLS) * CELL, CELL, CELL);
    }
    ctx.restore();
  }

  /* Grid lines - only in edit mode, simple black border */
  if (!viewMode) {
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 0.5;
    for (var c = 0; c <= COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke();
    }
    for (var r = 0; r <= ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke();
    }
  }

  /* Crop overlay */
  if (cropActive && cropRect) drawCropOverlay();

  /* WASD cursor */
  if (cursorVisible && !viewMode) drawWASDCursor();
}

function drawCropOverlay() {
  var r = cropRect;
  var x = r.col * CELL, y = r.row * CELL, w = r.cols * CELL, h = r.rows * CELL;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
  ctx.clearRect(x, y, w, h);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(x, y, w, h);
  for (var i = 0; i < pixels.length; i++) {
    if (!pixels[i]) continue;
    var c2 = i % COLS, r2 = Math.floor(i / COLS);
    if (c2 < r.col || c2 >= r.col + r.cols || r2 < r.row || r2 >= r.row + r.rows) continue;
    ctx.fillStyle = pixels[i];
    ctx.fillRect(c2 * CELL, r2 * CELL, CELL, CELL);
  }
  ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
  ctx.strokeRect(x + 1, y + 1, w - 2, h - 2); ctx.setLineDash([]);
  var HR = 7;
  [[x,y],[x+w,y],[x+w,y+h],[x,y+h]].forEach(function(pt) {
    ctx.beginPath(); ctx.arc(pt[0], pt[1], HR, 0, Math.PI*2);
    ctx.fillStyle = '#00d4ff'; ctx.fill();
  });
  ctx.font = 'bold ' + Math.max(10, CELL * 0.35) + 'px "Space Mono",monospace';
  ctx.fillStyle = '#00d4ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(r.cols + 'x' + r.rows, x + w/2, y + h + 4);
  ctx.restore();
}

function drawWASDCursor() {
  var x = cursorCol * CELL, y = cursorRow * CELL;
  ctx.save();
  ctx.strokeStyle = '#ff6b35'; ctx.lineWidth = 3;
  ctx.strokeRect(x + 1.5, y + 1.5, CELL - 3, CELL - 3);
  ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.2;
  ctx.strokeRect(x + 4, y + 4, CELL - 8, CELL - 8);
  ctx.restore();
}

/* ── Index / bounds ── */
function idx(col, row) { return row * COLS + col; }
function inBounds(col, row) { return col >= 0 && col < COLS && row >= 0 && row < ROWS; }

function colRowFromEvent(e) {
  var src = (e.changedTouches && e.changedTouches.length) ? e.changedTouches[0] : e;
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;
  return {
    col: Math.floor((src.clientX - rect.left) * scaleX / CELL),
    row: Math.floor((src.clientY - rect.top)  * scaleY / CELL)
  };
}

/* ── Undo ── */
function saveHistory() {
  undoStack.push(pixels.slice());
  if (undoStack.length > 80) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  pixels = undoStack.pop();
  renderAll();
}

/* ── Paint ── */
function paintAt(col, row) {
  if (!inBounds(col, row)) return;
  var i = idx(col, row);
  if (currentTool === 'paint') pixels[i] = currentColor;
  else if (currentTool === 'erase') pixels[i] = null;
  renderAll();
  schedSave();
}

function paintRegion(c1, r1, c2, r2) {
  var minC = Math.max(0, Math.min(c1, c2));
  var maxC = Math.min(COLS-1, Math.max(c1, c2));
  var minR = Math.max(0, Math.min(r1, r2));
  var maxR = Math.min(ROWS-1, Math.max(r1, r2));
  for (var r = minR; r <= maxR; r++) {
    for (var c = minC; c <= maxC; c++) {
      if (currentTool === 'paint') pixels[idx(c,r)] = currentColor;
      else if (currentTool === 'erase') pixels[idx(c,r)] = null;
    }
  }
  renderAll(); schedSave();
}

function floodFill(col, row) {
  if (!inBounds(col, row)) return;
  var targetColor = pixels[idx(col, row)] || null;
  if (targetColor === currentColor) return;
  saveHistory();
  var stack = [[col, row]], visited = new Uint8Array(COLS * ROWS);
  while (stack.length) {
    var pt = stack.pop(), c = pt[0], r = pt[1];
    if (!inBounds(c, r)) continue;
    var pi = idx(c, r);
    if (visited[pi]) continue; visited[pi] = 1;
    if ((pixels[pi] || null) !== targetColor) continue;
    pixels[pi] = currentColor;
    stack.push([c+1,r],[c-1,r],[c,r+1],[c,r-1]);
  }
  renderAll(); schedSave();
}

function eyedropAt(col, row) {
  if (!inBounds(col, row) || !pixels[idx(col, row)]) return;
  setColor(pixels[idx(col, row)]);
}

/* ── Color ── */
function setColor(hex) {
  currentColor = hex;
  colorSwatch.style.background = hex;
  colorPicker.value = hex;
  colorHex.value = hex;
  document.querySelectorAll('.pal-swatch').forEach(function(s) {
    s.classList.toggle('active', s.dataset.color === hex);
  });
}
colorPicker.addEventListener('input', function() { setColor(this.value); });
colorHex.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { var v = this.value.trim(); if (/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v); }
});
colorHex.addEventListener('blur', function() {
  var v = this.value.trim(); if (/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v);
});
setColor(currentColor);

/* ── Palette ── */
function buildPaletteUI() {
  var pal = document.getElementById('palette');
  pal.innerHTML = '';
  palette.forEach(function(c) {
    var s = document.createElement('div');
    s.className = 'pal-swatch' + (c === currentColor ? ' active' : '');
    s.style.background = c;
    s.dataset.color = c;
    s.title = c;
    s.addEventListener('click', function() { setColor(c); });
    s.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      palette = palette.filter(function(p) { return p !== c; });
      buildPaletteUI();
    });
    pal.appendChild(s);
  });
}
document.getElementById('addPaletteBtn').addEventListener('click', function() {
  if (palette.indexOf(currentColor) < 0) { palette.push(currentColor); buildPaletteUI(); }
});

/* ── Tools ── */
document.querySelectorAll('.tool-btn[data-tool]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    currentTool = btn.dataset.tool;
    document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (currentTool === 'text') document.getElementById('textPop').classList.remove('hidden');
    else { document.getElementById('textPop').classList.add('hidden'); textInput.classList.add('hidden'); textPending = null; }
    updateCursor();
  });
});
function setTool(name) {
  var btn = document.querySelector('.tool-btn[data-tool="' + name + '"]');
  if (btn) btn.click();
}
function updateCursor() {
  var map = { paint:'crosshair', erase:'cell', fill:'copy', eyedrop:'zoom-in', text:'text' };
  canvas.style.cursor = viewMode ? 'default' : (map[currentTool] || 'crosshair');
}

/* ── Mouse events ── */
function handleDown(e) {
  if (viewMode) return;
  e.preventDefault();
  var cr = colRowFromEvent(e);

  /* Crop handle intercept */
  if (cropActive && cropRect) {
    var r = cropRect;
    var handles = [{col:r.col,row:r.row},{col:r.col+r.cols,row:r.row},{col:r.col+r.cols,row:r.row+r.rows},{col:r.col,row:r.row+r.rows}];
    for (var hi = 0; hi < handles.length; hi++) {
      if (Math.abs(cr.col - handles[hi].col) <= 1 && Math.abs(cr.row - handles[hi].row) <= 1) {
        cropHandleDrag = true; cropHandleIdx2 = hi;
        cropDragAnchor2 = {col:cr.col,row:cr.row};
        cropInitRect2 = {col:r.col,row:r.row,cols:r.cols,rows:r.rows};
        return;
      }
    }
  }

  if (currentTool === 'fill') { floodFill(cr.col, cr.row); return; }
  if (currentTool === 'eyedrop') { eyedropAt(cr.col, cr.row); return; }
  if (currentTool === 'text') { placeTextTool(cr); return; }
  if (currentTool === 'paint' || currentTool === 'erase') {
    isDragSelecting = true;
    dragSelectStart = { col: cr.col, row: cr.row };
    saveHistory();
    paintAt(cr.col, cr.row);
  }
}
function handleMove(e) {
  if (viewMode) return;
  if (e.cancelable) e.preventDefault();
  var cr = colRowFromEvent(e);
  if (inBounds(cr.col, cr.row)) coordsEl.textContent = 'X:' + cr.col + '  Y:' + cr.row;

  /* Crop drag */
  if (cropHandleDrag && cropActive && cropRect) {
    var dc = cr.col - cropDragAnchor2.col, dr2 = cr.row - cropDragAnchor2.row;
    var ri = cropInitRect2;
    if (cropHandleIdx2===0) { cropRect.col=Math.max(0,ri.col+dc); cropRect.row=Math.max(0,ri.row+dr2); cropRect.cols=ri.cols-(cropRect.col-ri.col); cropRect.rows=ri.rows-(cropRect.row-ri.row); }
    else if (cropHandleIdx2===1) { cropRect.row=Math.max(0,ri.row+dr2); cropRect.cols=Math.max(1,ri.cols+dc); cropRect.rows=ri.rows-(cropRect.row-ri.row); }
    else if (cropHandleIdx2===2) { cropRect.cols=Math.max(1,ri.cols+dc); cropRect.rows=Math.max(1,ri.rows+dr2); }
    else { cropRect.col=Math.max(0,ri.col+dc); cropRect.cols=ri.cols-(cropRect.col-ri.col); cropRect.rows=Math.max(1,ri.rows+dr2); }
    cropRect.cols=Math.max(1,Math.min(COLS-cropRect.col,cropRect.cols));
    cropRect.rows=Math.max(1,Math.min(ROWS-cropRect.row,cropRect.rows));
    renderAll(); return;
  }

  if (!isDragSelecting) return;
  if ((currentTool === 'paint' || currentTool === 'erase') && dragSelectStart) {
    paintRegion(dragSelectStart.col, dragSelectStart.row, cr.col, cr.row);
  }
}
function handleUp(e) {
  isDragSelecting = false;
  lastPainted = -1;
  cropHandleDrag = false;
}

canvas.addEventListener('mousedown', handleDown);
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseup', handleUp);
canvas.addEventListener('mouseleave', function() { isDragSelecting = false; coordsEl.textContent = '-'; });
canvas.addEventListener('touchstart', function(e){handleDown(e);}, { passive: false });
canvas.addEventListener('touchmove',  function(e){handleMove(e);}, { passive: false });
canvas.addEventListener('touchend',   function(e){handleUp(e);},   { passive: false });

/* Crop handle state */
var cropHandleDrag = false, cropHandleIdx2 = -1, cropDragAnchor2 = null, cropInitRect2 = null;

/* ── WASD keyboard ── */
document.addEventListener('keydown', function(e) {
  var tag = document.activeElement ? document.activeElement.tagName : '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); return; }

  var key = e.key;
  var moved = false;
  if (key==='w'||key==='W'||key==='ArrowUp')    { cursorRow=Math.max(0,cursorRow-1); moved=true; }
  if (key==='s'||key==='S'||key==='ArrowDown')  { cursorRow=Math.min(ROWS-1,cursorRow+1); moved=true; }
  if (key==='a'||key==='A'||key==='ArrowLeft')  { cursorCol=Math.max(0,cursorCol-1); moved=true; }
  if (key==='d'||key==='D'||key==='ArrowRight') { cursorCol=Math.min(COLS-1,cursorCol+1); moved=true; }
  if (moved) {
    e.preventDefault();
    cursorVisible = true;
    coordsEl.textContent = 'X:' + cursorCol + '  Y:' + cursorRow;
    renderAll(); return;
  }
  if (key==='e'||key==='E') {
    e.preventDefault();
    if (!cursorVisible) { cursorVisible=true; renderAll(); return; }
    if (currentTool==='paint'||currentTool==='erase') { saveHistory(); paintAt(cursorCol,cursorRow); }
    else if (currentTool==='fill') floodFill(cursorCol,cursorRow);
    return;
  }
  /* Tool shortcuts - only if not WASD keys to avoid conflict */
  var toolMap = { p:'paint', r:'erase', f:'fill', k:'eyedrop', t:'text' };
  if (!e.ctrlKey && !e.metaKey && toolMap[key.toLowerCase()]) setTool(toolMap[key.toLowerCase()]);
});

/* ── Text Tool ── */
document.getElementById('textFontSize').addEventListener('input', function() {
  textFontSize = +this.value;
  document.getElementById('textFontSizeVal').textContent = textFontSize;
});
document.getElementById('textColorPick').addEventListener('input', function() { textColor = this.value; });
document.getElementById('textPopClose').addEventListener('click', function() { document.getElementById('textPop').classList.add('hidden'); });

function placeTextTool(cr) {
  textPending = cr;
  var wrapRect = canvasWrap.getBoundingClientRect();
  var areaRect = canvasArea.getBoundingClientRect();
  var cellPx = CELL * vpScale;
  textInput.style.left = (wrapRect.left - areaRect.left + cr.col * cellPx) + 'px';
  textInput.style.top  = (wrapRect.top  - areaRect.top  + cr.row * cellPx) + 'px';
  textInput.classList.remove('hidden');
  textInput.value = '';
  textInput.focus();
}
function commitText() {
  if (textPending && textInput.value.trim()) {
    saveHistory(); renderTextOnCanvas(textPending.col, textPending.row, textInput.value.trim());
  }
  textInput.classList.add('hidden'); textInput.value = ''; textPending = null;
}
textInput.addEventListener('keydown', function(e) {
  if (e.key==='Enter') commitText();
  if (e.key==='Escape') { textInput.classList.add('hidden'); textInput.value=''; textPending=null; }
});
textInput.addEventListener('blur', commitText);

function renderTextOnCanvas(startCol, startRow, text) {
  var offW = COLS*CELL, offH = ROWS*CELL;
  var off = document.createElement('canvas'); off.width=offW; off.height=offH;
  var oc = off.getContext('2d');
  oc.font = textFontSize + 'px "Silkscreen",monospace';
  oc.fillStyle = textColor; oc.textBaseline = 'top';
  oc.fillText(text, startCol*CELL, startRow*CELL);
  var d = oc.getImageData(0,0,offW,offH).data;
  for (var r=0;r<ROWS;r++) for (var c=0;c<COLS;c++) {
    var sx=Math.round(c*CELL+CELL/2), sy=Math.round(r*CELL+CELL/2), pi=(sy*offW+sx)*4;
    if (d[pi+3]>60) pixels[idx(c,r)] = rgbToHex(d[pi],d[pi+1],d[pi+2]);
  }
  renderAll();
}
function rgbToHex(r,g,b) { return '#'+('0'+r.toString(16)).slice(-2)+('0'+g.toString(16)).slice(-2)+('0'+b.toString(16)).slice(-2); }

/* ── Undo / Clear ── */
document.getElementById('unpaintBtn').addEventListener('click', function() { undo(); schedSave(); });
document.getElementById('clearBtn').addEventListener('click', function() {
  if (!confirm('Clear canvas?')) return;
  saveHistory(); pixels.fill(null); cropRect=null; renderAll(); schedSave();
});

/* ── Zoom ── */
document.getElementById('zoomInBtn').addEventListener('click', function() { setZoom(vpScale*1.5); });
document.getElementById('zoomOutBtn').addEventListener('click', function() { setZoom(vpScale/1.5); });
document.getElementById('zoomFitBtn').addEventListener('click', autoFitZoom);
function setZoom(z) { vpScale=Math.max(0.25,Math.min(40,z)); centerCanvas(); }
canvasArea.addEventListener('wheel', function(e) { e.preventDefault(); setZoom(vpScale*(e.deltaY<0?1.15:1/1.15)); }, {passive:false});

/* Pan */
var panOn=false, panStart={x:0,y:0}, panVp={x:0,y:0}, spaceDown=false;
document.addEventListener('keydown', function(e) {
  if (e.code==='Space' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA') {
    spaceDown=true; canvasArea.style.cursor='grab'; e.preventDefault();
  }
});
document.addEventListener('keyup', function(e) { if(e.code==='Space'){spaceDown=false;canvasArea.style.cursor='';} });
canvasArea.addEventListener('mousedown', function(e) {
  if (e.button===1||spaceDown) { panOn=true; panStart={x:e.clientX,y:e.clientY}; panVp={x:vpX,y:vpY}; canvasArea.style.cursor='grabbing'; e.preventDefault(); }
});
document.addEventListener('mousemove', function(e) { if(!panOn)return; vpX=panVp.x+(e.clientX-panStart.x); vpY=panVp.y+(e.clientY-panStart.y); applyTransform(); });
document.addEventListener('mouseup', function() { if(panOn){panOn=false;canvasArea.style.cursor='';} });

document.getElementById('ghostBtn').addEventListener('click', function() {

var exportMenu = document.getElementById('exportMenu');

document.addEventListener('click', function() { exportMenu.classList.remove('open'); });

function getExportCanvas(scale) {
  var c=cropActive&&cropRect?cropRect:null, sc=c?c.col:0, sr=c?c.row:0, cols=c?c.cols:COLS, rows=c?c.rows:ROWS;
  var ec=document.createElement('canvas'); ec.width=cols*scale; ec.height=rows*scale;
  var ex=ec.getContext('2d');
  ex.fillStyle='#ffffff'; ex.fillRect(0,0,ec.width,ec.height);
  for (var r=0;r<rows;r++) for (var col=0;col<cols;col++) {
    var pi=idx(sc+col,sr+r); if(!pixels[pi])continue;
    ex.fillStyle=pixels[pi]; ex.fillRect(col*scale,r*scale,scale,scale);
  }
  return ec;
}
document.getElementById('exportPNG').addEventListener('click', function() { exportMenu.classList.remove('open'); getExportCanvas(1).toBlob(function(b){triggerDownload(URL.createObjectURL(b),'pixel-art.png');}); });
document.getElementById('exportPNG3').addEventListener('click', function() { exportMenu.classList.remove('open'); getExportCanvas(3).toBlob(function(b){triggerDownload(URL.createObjectURL(b),'pixel-art@3x.png');}); });
document.getElementById('exportSVG').addEventListener('click', function() {
  exportMenu.classList.remove('open');
  var c=cropActive&&cropRect?cropRect:null, sc=c?c.col:0, sr=c?c.row:0, cols=c?c.cols:COLS, rows=c?c.rows:ROWS;
  var parts=['<svg xmlns="http://www.w3.org/2000/svg" width="'+cols+'" height="'+rows+'" viewBox="0 0 '+cols+' '+rows+'"><rect width="'+cols+'" height="'+rows+'" fill="#fff"/>'];
  for (var r=0;r<rows;r++) for (var col=0;col<cols;col++) { var pi=idx(sc+col,sr+r); if(!pixels[pi])continue; parts.push('<rect x="'+col+'" y="'+r+'" width="1" height="1" fill="'+pixels[pi]+'"/>'); }
  parts.push('</svg>');
  var blob=new Blob([parts.join('\n')],{type:'image/svg+xml'});
  triggerDownload(URL.createObjectURL(blob),'pixel-art.svg');
});
function triggerDownload(url,name) { var a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(function(){URL.revokeObjectURL(url);},1000); }

/* ── Library ── */
document.getElementById('libraryBtn').addEventListener('click', function() { buildLibraryUI(); document.getElementById('libraryModal').classList.remove('hidden'); });
document.getElementById('libCloseBtn').addEventListener('click', function() { document.getElementById('libraryModal').classList.add('hidden'); });
document.getElementById('libImportBtn').addEventListener('click', function() { document.getElementById('libJsonArea').focus(); });
document.getElementById('libConfirmImport').addEventListener('click', function() {
  try { var data=JSON.parse(document.getElementById('libJsonArea').value); loadFromData(data); document.getElementById('libraryModal').classList.add('hidden'); }
  catch(ex) { alert('Invalid JSON: '+ex.message); }
});
function buildLibraryUI() {
  var grid=document.getElementById('libGrid'); grid.innerHTML='';
  if (!library.length) { grid.innerHTML='<div style="color:var(--muted);font-size:11px;grid-column:1/-1;padding:16px;">No sprites yet. Use PUSH to save.</div>'; return; }
  library.forEach(function(item,i) {
    var div=document.createElement('div'); div.className='lib-item'; div.style.position='relative';
    var tc=document.createElement('canvas'); tc.width=item.cols; tc.height=item.rows;
    tc.style.cssText='width:'+Math.min(80,item.cols*3)+'px;height:'+Math.min(80,item.rows*3)+'px;image-rendering:pixelated;display:block;margin:0 auto 6px;background:#fff;border:1px solid rgba(0,0,0,0.1);';
    var tx=tc.getContext('2d');
    for (var pi=0;pi<item.pixels.length;pi++) { if(!item.pixels[pi])continue; tx.fillStyle=item.pixels[pi]; tx.fillRect(pi%item.cols,Math.floor(pi/item.cols),1,1); }
    var nm=document.createElement('div'); nm.className='lib-item-name'; nm.textContent=item.name;
    var del=document.createElement('button'); del.textContent='x'; del.style.cssText='position:absolute;top:4px;right:4px;background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;line-height:1;';
    div.appendChild(tc); div.appendChild(nm); div.appendChild(del);
    div.addEventListener('click', (function(d){return function(){loadFromData(d);document.getElementById('libraryModal').classList.add('hidden');};})(item));
    del.addEventListener('click', (function(ii){return function(e){e.stopPropagation();library.splice(ii,1);buildLibraryUI();saveLibraryDB();};})(i));
    grid.appendChild(div);
  });
}
function loadFromData(data) {
  COLS=data.cols; ROWS=data.rows; pixels=data.pixels.slice();
  ghostData=null; cropRect=null; undoStack=[];
  autoFitZoom(); renderAll(); buildPaletteUI();
}

/* ── Push ── */
document.getElementById('pushBtn').addEventListener('click', function() {
  var c=cropActive&&cropRect?cropRect:null, sc=c?c.col:0, sr=c?c.row:0, cols=c?c.cols:COLS, rows=c?c.rows:ROWS;
  var slice=[];
  for (var r=0;r<rows;r++) for (var col=0;col<cols;col++) slice.push(pixels[idx(sc+col,sr+r)]||null);
  document.getElementById('pushJson').value=JSON.stringify({name:'sprite',cols:cols,rows:rows,pixels:slice},null,2);
  document.getElementById('pushName').value='';
  document.getElementById('pushModal').classList.remove('hidden');
});
document.getElementById('pushCloseBtn').addEventListener('click', function(){document.getElementById('pushModal').classList.add('hidden');});
document.getElementById('pushCopyBtn').addEventListener('click', function() {
  var ta=document.getElementById('pushJson');
  if (navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(ta.value).then(function(){showToast('Copied!');});
  else { ta.select(); document.execCommand('copy'); showToast('Copied!'); }
});
document.getElementById('pushSaveBtn').addEventListener('click', function() {
  var name=document.getElementById('pushName').value.trim()||'sprite';
  try { var data=JSON.parse(document.getElementById('pushJson').value); data.name=name; library.push(data); saveLibraryDB(); document.getElementById('pushModal').classList.add('hidden'); showToast('Saved!'); }
  catch(ex){}
});

/* ── IndexedDB ── */
var _db=null;
(function initDB() {
  var req=indexedDB.open('PixelForgeDB',2);
  req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains('state'))db.createObjectStore('state');if(!db.objectStoreNames.contains('library'))db.createObjectStore('library');};
  req.onsuccess=function(e){_db=e.target.result;loadStateDB();loadLibraryDB();};
})();
function saveStateDB() { if(!_db)return; _db.transaction('state','readwrite').objectStore('state').put({cols:COLS,rows:ROWS,pixels:pixels.slice(),palette:palette.slice()},'current'); }
function loadStateDB() {
  if(!_db)return;
  var req=_db.transaction('state','readonly').objectStore('state').get('current');
  req.onsuccess=function(e){
    var s=e.target.result;
    if(s){document.getElementById('setupModal').classList.add('hidden');document.getElementById('app').classList.remove('hidden');COLS=s.cols;ROWS=s.rows;pixels=s.pixels||new Array(COLS*ROWS).fill(null);palette=s.palette||palette;autoFitZoom();renderAll();buildPaletteUI();}
  };
}
function saveLibraryDB(){if(!_db)return;_db.transaction('library','readwrite').objectStore('library').put(library,'lib');}
function loadLibraryDB(){if(!_db)return;var req=_db.transaction('library','readonly').objectStore('library').get('lib');req.onsuccess=function(e){if(e.target.result)library=e.target.result;};}

var saveTimer=null;
function schedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveStateDB,800);}

/* ── Toast ── */
var toastEl=null;
function showToast(msg){
  if(!toastEl){toastEl=document.createElement('div');toastEl.style.cssText='position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--accent);color:var(--accent);font-family:"Silkscreen",monospace;font-size:11px;padding:8px 18px;border-radius:3px;z-index:9999;letter-spacing:1px;pointer-events:none;transition:opacity 0.3s;';document.body.appendChild(toastEl);}
  toastEl.textContent=msg;toastEl.style.opacity='1';
  clearTimeout(toastEl._t);toastEl._t=setTimeout(function(){toastEl.style.opacity='0';},2200);
}

/* ── Resize ── */
window.addEventListener('resize',function(){if(!document.getElementById('app').classList.contains('hidden'))centerCanvas();});
</script>
</body>
</html>
